server {
    listen 8282;
    server_name localhost;

    client_max_body_size 0;

    root /usr/share/nginx/html;

    location / {
        add_header 'Access-Control-Allow-Origin' '*';
        try_files $uri $uri/ /index.html =404;
    }
    
    location /api {
        proxy_pass http://127.0.0.1:8000/;
    } 
}
